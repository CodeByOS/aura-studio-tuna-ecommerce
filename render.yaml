services:
  - type: web
    name: aura-ecommerce-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: standard
    healthCheckPath: /
    
    # Environment variables (set these in Render dashboard or here)
    envVars:
      - key: APP_NAME
        value: "AURA E-Commerce"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromService:
          type: postgres
          property: host
      - key: DB_PORT
        fromService:
          type: postgres
          property: port
      - key: DB_DATABASE
        fromService:
          type: postgres
          property: database
      - key: DB_USERNAME
        fromService:
          type: postgres
          property: username
      - key: DB_PASSWORD
        fromService:
          type: postgres
          property: password
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: SESSION_DRIVER
        value: database
    
    # Build command
    buildCommand: composer install --no-dev --optimize-autoloader && php artisan migrate --force
    
    # Start command (Apache runs via CMD in Dockerfile)
    startCommand: ""
    
    # Auto-deploy on push
    autoDeploy: true
