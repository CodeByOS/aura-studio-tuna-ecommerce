services:
  - type: web
    name: aura-ecommerce-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: standard
    healthCheckPath: /health

    # One Render service serves both the Laravel backend and the Blade frontend.
    # Set DB_URL in the Render dashboard to your Neon connection string.
    envVars:
      - key: APP_NAME
        value: "AURA E-Commerce"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: pgsql
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: SESSION_DRIVER
        value: database

    # Auto-deploy on push
    autoDeploy: true
